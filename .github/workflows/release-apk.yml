name: Build & release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for this release (e.g., v1.0.1). Will be created if it does not exist.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve version & versionCode from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${{ github.ref_name }}"
          fi
          # strip leading 'v' and any pre-release suffix (e.g. -beta.1)
          VERSION_FULL="${RAW_TAG#v}"
          VERSION="${VERSION_FULL%%-*}"
          IFS=. read -r MAJOR MINOR PATCH <<<"$VERSION"
          : "${MAJOR:=0}" "${MINOR:=0}" "${PATCH:=0}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Tag '$RAW_TAG' does not match v<major>.<minor>.<patch>"
            exit 1
          fi
          if [ "$MINOR" -gt 99 ] || [ "$PATCH" -gt 99 ]; then
            echo "::error::minor/patch must each be <= 99 (got $MINOR/$PATCH)"
            exit 1
          fi
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "tag=$RAW_TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Tag $RAW_TAG → version=$VERSION versionCode=$VERSION_CODE"

      - name: Inject version & versionCode into app.json
        env:
          INJ_VERSION: ${{ steps.version.outputs.version }}
          INJ_VERSION_CODE: ${{ steps.version.outputs.versionCode }}
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            j.expo.version = process.env.INJ_VERSION;
            j.expo.android = j.expo.android || {};
            j.expo.android.versionCode = parseInt(process.env.INJ_VERSION_CODE, 10);
            fs.writeFileSync('app.json', JSON.stringify(j, null, 2) + '\n');
          "
          grep -E '\"version\"|\"versionCode\"' app.json

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.keystore"
          test -s "$RUNNER_TEMP/signing/release.keystore" || { echo "::error::Decoded keystore is empty"; exit 1; }

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/signing/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Verify signature
        run: |
          BT_DIR=$(ls -d "$ANDROID_HOME/build-tools/"*/ | sort -V | tail -1)
          APK=android/app/build/outputs/apk/release/app-release.apk
          "${BT_DIR}apksigner" verify --print-certs "$APK" | grep -E '^(V[0-9]+ Signer: certificate DN|Verified using v)'

      - name: Rename APK with version
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUT="one-sentence-diary-v${VERSION}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$OUT"
          echo "apk_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_path }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
