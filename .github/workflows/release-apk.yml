name: Build & release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for this release (e.g., v1.0.1). Will be created if it does not exist.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Keyed on package-lock.json because the android/ project (and thus
          # all *.gradle files) is regenerated by `expo prebuild` from the
          # installed expo packages — so its hash is determined by the lock.
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve version & versionCode from tag
        id: version
        env:
          # Pass through env: vars to avoid shell-injection from `${{ ... }}`
          # interpolation directly into `run:` script bodies.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW_TAG="$INPUT_TAG"
          else
            RAW_TAG="$REF_NAME"
          fi
          # strip leading 'v' and any pre-release suffix (e.g. -beta.1)
          VERSION_FULL="${RAW_TAG#v}"
          VERSION="${VERSION_FULL%%-*}"
          IFS=. read -r MAJOR MINOR PATCH <<<"$VERSION"
          : "${MAJOR:=0}" "${MINOR:=0}" "${PATCH:=0}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Tag '$RAW_TAG' does not match v<major>.<minor>.<patch>"
            exit 1
          fi
          if [ "$MINOR" -gt 99 ] || [ "$PATCH" -gt 99 ]; then
            echo "::error::minor/patch must each be <= 99 (got $MINOR/$PATCH)"
            exit 1
          fi
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          # Treat any tag carrying a SemVer pre-release suffix (e.g. v1.0.3-rc1,
          # v1.0.3-beta.1) as a prerelease so Obtainium / GitHub clients that
          # follow only "latest" releases skip it. Used for CI smoke-testing
          # the release workflow without nudging end users to upgrade.
          if [ "$VERSION_FULL" != "$VERSION" ]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "tag=$RAW_TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag $RAW_TAG → version=$VERSION versionCode=$VERSION_CODE prerelease=$IS_PRERELEASE"

      - name: Inject version & versionCode into app.json
        env:
          INJ_VERSION: ${{ steps.version.outputs.version }}
          INJ_VERSION_CODE: ${{ steps.version.outputs.versionCode }}
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            j.expo.version = process.env.INJ_VERSION;
            j.expo.android = j.expo.android || {};
            j.expo.android.versionCode = parseInt(process.env.INJ_VERSION_CODE, 10);
            fs.writeFileSync('app.json', JSON.stringify(j, null, 2) + '\n');
          "
          grep -E '\"version\"|\"versionCode\"' app.json

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.keystore"
          test -s "$RUNNER_TEMP/signing/release.keystore" || { echo "::error::Decoded keystore is empty"; exit 1; }

      - name: Configure signing properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Append signing creds to android/gradle.properties (regenerated each
          # run by expo prebuild, gitignored). Avoids passing the password on
          # the gradle command-line, where it would briefly appear in argv.
          # Secret values are masked by GHA in any captured log output.
          cat >> android/gradle.properties <<EOF

          # Injected by CI (do not commit)
          android.injected.signing.store.file=$RUNNER_TEMP/signing/release.keystore
          android.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD
          android.injected.signing.key.alias=$ANDROID_KEY_ALIAS
          android.injected.signing.key.password=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: android
        env:
          # 4 GB heap reduces GC overhead during R8 + RN module compilation;
          # ubuntu-latest runners have 16 GB RAM.
          GRADLE_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=512m'
        run: |
          # --build-cache enables Gradle's local build cache; combined with
          # the cached ~/.gradle/caches directory above, this reuses compiled
          # artifacts across runs when package-lock.json is unchanged.
          # Daemon is left enabled (default); JVM warm-up amortizes per run.
          ./gradlew assembleRelease --build-cache

      - name: Verify signature
        run: |
          set -o pipefail
          BT_DIR=$(ls -d "$ANDROID_HOME/build-tools/"*/ | sort -V | tail -1)
          APK=android/app/build/outputs/apk/release/app-release.apk
          # apksigner returns non-zero on verification failure; --verbose
          # adds "Verified using v<N> scheme: true" lines for traceability.
          "${BT_DIR}apksigner" verify --verbose --print-certs "$APK"

      - name: Rename APK with version
        id: rename
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          OUT="one-sentence-diary-v${VERSION}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$OUT"
          echo "apk_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_path }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

      - name: Publish GitHub Release
        # Pinned to SHA (v3.0.0) — third-party action; mutable major tags
        # would be a supply-chain risk if the upstream repo were compromised.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          # Use the version step's validated `tag` output rather than raw
          # `inputs.tag` / `github.ref_name`.
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
