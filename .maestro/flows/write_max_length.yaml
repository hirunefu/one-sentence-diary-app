appId: com.hirunefu.onesentencediary
---
- launchApp:
    clearState: true
    stopApp: true
- tapOn:
    id: "entry-input"
# 140 Japanese characters (each counted as 1 by countChars).
# Pattern: 3 full kana sequences (46 chars each) + "あい" = 138 + 2 = 140.
- inputText: "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんあいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんあいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんあい"
- assertVisible: "残り 0 字"
# Typing one more character must be dropped silently.
- tapOn:
    id: "entry-input"
- inputText: "X"
- assertVisible: "残り 0 字"
