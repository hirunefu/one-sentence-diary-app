appId: com.hirunefu.onesentencediary
---
- launchApp:
    clearState: true
    stopApp: true

# Seed today's entry first.
- tapOn:
    id: "entry-input"
- inputText: "original text"
- hideKeyboard
- tapOn:
    id: "save-button"

# Open the entry from the timeline (no need to know today's date string).
- tapOn:
    text: "履歴"
- tapOn:
    id: "history-tab-timeline"
- tapOn: "original text"

- assertVisible:
    id: "entry-input"
- tapOn:
    id: "entry-input"
- inputText: " edited"
- hideKeyboard
- tapOn:
    id: "editor-save"

# Verify the edit persisted in the timeline.
- assertVisible:
    id: "history-tab-timeline"
- assertVisible: "original text edited"
