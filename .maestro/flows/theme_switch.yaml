appId: com.hirunefu.onesentencediary
---
- launchApp:
    clearState: true
    stopApp: true
- tapOn:
    text: "設定"
- tapOn:
    id: "settings-theme-dark"
- tapOn:
    id: "settings-theme-light"
- tapOn:
    id: "settings-theme-system"
# Sanity: settings screen still visible after the cycle.
- assertVisible:
    id: "settings-export"
