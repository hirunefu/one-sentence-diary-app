<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 紙風の背景 (Android 円形マスクで全面表示されるよう全面塗り) -->
  <rect width="1024" height="1024" fill="#f3e6cd"/>

  <!-- 「口」を明朝体で描画 (dominant-baseline=central で文字中心を canvas 中心に) -->
  <text
    x="512"
    y="560"
    text-anchor="middle"
    dominant-baseline="central"
    font-size="680"
    font-family="Yu Mincho, MS Mincho, Hiragino Mincho ProN, Hiragino Mincho Pro, Noto Serif CJK JP, serif"
    fill="#2b2117">口</text>

  <!-- 「一」を「口」の中心に明朝体で描画 (同じく中央) -->
  <text
    x="512"
    y="560"
    text-anchor="middle"
    dominant-baseline="central"
    font-size="300"
    font-family="Yu Mincho, MS Mincho, Hiragino Mincho ProN, Hiragino Mincho Pro, Noto Serif CJK JP, serif"
    fill="#2b2117">一</text>
</svg>
